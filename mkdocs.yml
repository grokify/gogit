site_name: gogit
site_description: Generic, dependency-light Git ergonomics for Go
site_url: https://grokify.github.io/gogit
repo_name: grokify/gogit
repo_url: https://github.com/grokify/gogit

theme:
  name: material
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Releases:
      - v0.5.0: releases/v0.5.0.md
      - v0.4.0: releases/v0.4.0.md
      - v0.3.0: releases/v0.3.0.md
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
